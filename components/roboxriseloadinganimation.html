<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoboxRise Loader</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    font-family: sans-serif;
  }

  #roboxrise-loader {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    z-index: 9999;
    opacity: 1;
    transition: opacity 0.5s ease;
    will-change: opacity;
  }
  #roboxrise-loader.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #roboxrise-loader svg {
    width: min(520px, 88vw);
    height: auto;
    display: block;
    overflow: visible;
  }

  #loader-group,
  #glow-group,
  #sweep-layer { will-change: transform, opacity; }

  /* ─── Main strokes ─── */
  .lp {
    fill: #ffffff;
    fill-opacity: 0;
    stroke: url(#strokeGrad);
    stroke-width: 0.32;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-opacity: 0;           /* start invisible — keyframes control */
    animation-duration: 5.8s;
    animation-iteration-count: infinite;
    animation-fill-mode: both;
  }

  /* ─── Glow strokes ─── */
  .lp-glow {
    fill: none;
    stroke: #ffffff;
    stroke-width: 1.0;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    animation-duration: 5.8s;
    animation-timing-function: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    animation-iteration-count: infinite;
    animation-fill-mode: both;
  }

  /* ═══════════════════════════════════════════════════════════════════════
     KEYFRAMES — 5.8s cycle

     DOT FIX: Every stroke animation now includes stroke-opacity.
       • stroke-opacity: 0  during blank/pre-draw/post-erase phases
       • stroke-opacity: 1  ramps in at draw start, ramps out at erase end
       This guarantees zero visible cap remnants at any point.

     SMOOTHNESS: Runway keyframes on draw-in preserved.
     Erase overshoot REMOVED (it caused trailing-dot flash).
     Erase uses clean linear-out with stroke-opacity fade at tail.

     stroke-dasharray uses "L (L+2)" pattern so the gap exceeds
     the dash, preventing cap bleed at offset boundaries.
     ═══════════════════════════════════════════════════════════════════════ */

  /* ─── P1  L=204.59 ─── */
  @keyframes lp1s {
    0%,0.5%     { stroke-dashoffset: 204.59; stroke-opacity: 0; }
    1%          { stroke-opacity: 1; }
    1.5%        { stroke-dashoffset: 200.00; }
    12%         { stroke-dashoffset: -1.2; }
    13.5%       { stroke-dashoffset: 0; }
    54%         { stroke-dashoffset: 0; }
    67%         { stroke-dashoffset: -204.59; stroke-opacity: 1; }
    67.5%       { stroke-opacity: 0; }
    67.51%,100% { stroke-dashoffset: -204.59; stroke-opacity: 0; }
  }
  @keyframes lp1f {
    0%,6%     { fill-opacity: 0; }
    9%        { fill-opacity: 0.15; }
    12%       { fill-opacity: 0.5; }
    16%       { fill-opacity: 0.9; }
    19%       { fill-opacity: 1; }
    52%       { fill-opacity: 1; }
    53.5%     { fill-opacity: 0.82; }
    55%       { fill-opacity: 1; }
    58%       { fill-opacity: 0.9; }
    61%       { fill-opacity: 0.5; }
    64%       { fill-opacity: 0.15; }
    66%       { fill-opacity: 0; }
    100%      { fill-opacity: 0; }
  }
  @keyframes lg1 {
    0%        { opacity: 0; stroke-dashoffset: 204.59; }
    1%        { opacity: 0.3; stroke-dashoffset: 201; }
    6%        { opacity: 0.65; }
    12%       { stroke-dashoffset: 0; opacity: 0.45; }
    20%       { opacity: 0; }
    52%       { opacity: 0; stroke-dashoffset: 0; }
    55%       { opacity: 0.5; }
    67%       { stroke-dashoffset: -204.59; opacity: 0; }
    100%      { opacity: 0; }
  }

  /* ─── P2  L=111.11 ─── */
  @keyframes lp2s {
    0%,7.5%     { stroke-dashoffset: 111.11; stroke-opacity: 0; }
    8%          { stroke-opacity: 1; }
    9%          { stroke-dashoffset: 108.5; }
    24%         { stroke-dashoffset: -0.8; }
    25.5%       { stroke-dashoffset: 0; }
    55%         { stroke-dashoffset: 0; }
    68%         { stroke-dashoffset: -111.11; stroke-opacity: 1; }
    68.5%       { stroke-opacity: 0; }
    68.51%,100% { stroke-dashoffset: -111.11; stroke-opacity: 0; }
  }
  @keyframes lp2f {
    0%,18%    { fill-opacity: 0; }
    21%       { fill-opacity: 0.15; }
    24%       { fill-opacity: 0.5; }
    27%       { fill-opacity: 0.9; }
    30%       { fill-opacity: 1; }
    53%       { fill-opacity: 1; }
    54.5%     { fill-opacity: 0.82; }
    56%       { fill-opacity: 1; }
    59%       { fill-opacity: 0.9; }
    62%       { fill-opacity: 0.5; }
    65%       { fill-opacity: 0.15; }
    67%       { fill-opacity: 0; }
    100%      { fill-opacity: 0; }
  }
  @keyframes lg2 {
    0%,7.5%   { opacity: 0; stroke-dashoffset: 111.11; }
    9%        { opacity: 0.3; stroke-dashoffset: 108.5; }
    15%       { opacity: 0.65; }
    24%       { stroke-dashoffset: 0; opacity: 0.45; }
    31%       { opacity: 0; }
    53%       { opacity: 0; stroke-dashoffset: 0; }
    56%       { opacity: 0.5; }
    68%       { stroke-dashoffset: -111.11; opacity: 0; }
    100%      { opacity: 0; }
  }

  /* ─── P3  L=100.78 ─── */
  @keyframes lp3s {
    0%,14%      { stroke-dashoffset: 100.78; stroke-opacity: 0; }
    14.5%       { stroke-opacity: 1; }
    15.5%       { stroke-dashoffset: 98.5; }
    30%         { stroke-dashoffset: -0.7; }
    31.5%       { stroke-dashoffset: 0; }
    56%         { stroke-dashoffset: 0; }
    69%         { stroke-dashoffset: -100.78; stroke-opacity: 1; }
    69.5%       { stroke-opacity: 0; }
    69.51%,100% { stroke-dashoffset: -100.78; stroke-opacity: 0; }
  }
  @keyframes lp3f {
    0%,24%    { fill-opacity: 0; }
    27%       { fill-opacity: 0.15; }
    30%       { fill-opacity: 0.5; }
    33%       { fill-opacity: 0.9; }
    36%       { fill-opacity: 1; }
    54%       { fill-opacity: 1; }
    55.5%     { fill-opacity: 0.82; }
    57%       { fill-opacity: 1; }
    60%       { fill-opacity: 0.9; }
    63%       { fill-opacity: 0.5; }
    66%       { fill-opacity: 0.15; }
    68%       { fill-opacity: 0; }
    100%      { fill-opacity: 0; }
  }
  @keyframes lg3 {
    0%,14%    { opacity: 0; stroke-dashoffset: 100.78; }
    15.5%     { opacity: 0.3; stroke-dashoffset: 98.5; }
    21%       { opacity: 0.65; }
    30%       { stroke-dashoffset: 0; opacity: 0.45; }
    37%       { opacity: 0; }
    54%       { opacity: 0; stroke-dashoffset: 0; }
    57%       { opacity: 0.5; }
    69%       { stroke-dashoffset: -100.78; opacity: 0; }
    100%      { opacity: 0; }
  }

  /* ─── P4  L=80.70 ─── */
  @keyframes lp4s {
    0%,20%      { stroke-dashoffset: 80.70; stroke-opacity: 0; }
    20.5%       { stroke-opacity: 1; }
    21.5%       { stroke-dashoffset: 79.0; }
    35%         { stroke-dashoffset: -0.5; }
    36.2%       { stroke-dashoffset: 0; }
    57%         { stroke-dashoffset: 0; }
    70%         { stroke-dashoffset: -80.70; stroke-opacity: 1; }
    70.5%       { stroke-opacity: 0; }
    70.51%,100% { stroke-dashoffset: -80.70; stroke-opacity: 0; }
  }
  @keyframes lp4f {
    0%,29%    { fill-opacity: 0; }
    32%       { fill-opacity: 0.15; }
    35%       { fill-opacity: 0.5; }
    38%       { fill-opacity: 0.9; }
    41%       { fill-opacity: 1; }
    55%       { fill-opacity: 1; }
    56.5%     { fill-opacity: 0.82; }
    58%       { fill-opacity: 1; }
    61%       { fill-opacity: 0.9; }
    64%       { fill-opacity: 0.5; }
    67%       { fill-opacity: 0.15; }
    69%       { fill-opacity: 0; }
    100%      { fill-opacity: 0; }
  }
  @keyframes lg4 {
    0%,20%    { opacity: 0; stroke-dashoffset: 80.70; }
    21.5%     { opacity: 0.3; stroke-dashoffset: 79.0; }
    26%       { opacity: 0.65; }
    35%       { stroke-dashoffset: 0; opacity: 0.45; }
    42%       { opacity: 0; }
    55%       { opacity: 0; stroke-dashoffset: 0; }
    58%       { opacity: 0.5; }
    70%       { stroke-dashoffset: -80.70; opacity: 0; }
    100%      { opacity: 0; }
  }

  /* ─── P5  L=103.36 ─── */
  @keyframes lp5s {
    0%,25%      { stroke-dashoffset: 103.36; stroke-opacity: 0; }
    25.5%       { stroke-opacity: 1; }
    26.5%       { stroke-dashoffset: 101.0; }
    40%         { stroke-dashoffset: -0.7; }
    41.5%       { stroke-dashoffset: 0; }
    58%         { stroke-dashoffset: 0; }
    71%         { stroke-dashoffset: -103.36; stroke-opacity: 1; }
    71.5%       { stroke-opacity: 0; }
    71.51%,100% { stroke-dashoffset: -103.36; stroke-opacity: 0; }
  }
  @keyframes lp5f {
    0%,34%    { fill-opacity: 0; }
    37%       { fill-opacity: 0.15; }
    40%       { fill-opacity: 0.5; }
    43%       { fill-opacity: 0.9; }
    46%       { fill-opacity: 1; }
    56%       { fill-opacity: 1; }
    57.5%     { fill-opacity: 0.82; }
    59%       { fill-opacity: 1; }
    62%       { fill-opacity: 0.9; }
    65%       { fill-opacity: 0.5; }
    68%       { fill-opacity: 0.15; }
    70%       { fill-opacity: 0; }
    100%      { fill-opacity: 0; }
  }
  @keyframes lg5 {
    0%,25%    { opacity: 0; stroke-dashoffset: 103.36; }
    26.5%     { opacity: 0.3; stroke-dashoffset: 101.0; }
    31%       { opacity: 0.65; }
    40%       { stroke-dashoffset: 0; opacity: 0.45; }
    47%       { opacity: 0; }
    56%       { opacity: 0; stroke-dashoffset: 0; }
    59%       { opacity: 0.5; }
    71%       { stroke-dashoffset: -103.36; opacity: 0; }
    100%      { opacity: 0; }
  }

  /* ─── P6  L=41.48 ─── */
  @keyframes lp6s {
    0%,29%      { stroke-dashoffset: 41.48; stroke-opacity: 0; }
    29.5%       { stroke-opacity: 1; }
    30%         { stroke-dashoffset: 40.5; }
    36%         { stroke-dashoffset: -0.3; }
    37%         { stroke-dashoffset: 0; }
    59%         { stroke-dashoffset: 0; }
    71%         { stroke-dashoffset: -41.48; stroke-opacity: 1; }
    71.5%       { stroke-opacity: 0; }
    71.51%,100% { stroke-dashoffset: -41.48; stroke-opacity: 0; }
  }
  @keyframes lp6f {
    0%,32%    { fill-opacity: 0; }
    34%       { fill-opacity: 0.15; }
    36%       { fill-opacity: 0.5; }
    38%       { fill-opacity: 0.9; }
    40%       { fill-opacity: 1; }
    57%       { fill-opacity: 1; }
    58.5%     { fill-opacity: 0.82; }
    60%       { fill-opacity: 1; }
    63%       { fill-opacity: 0.9; }
    66%       { fill-opacity: 0.5; }
    69%       { fill-opacity: 0.15; }
    70.5%     { fill-opacity: 0; }
    100%      { fill-opacity: 0; }
  }
  @keyframes lg6 {
    0%,29%    { opacity: 0; stroke-dashoffset: 41.48; }
    30%       { opacity: 0.3; stroke-dashoffset: 40.5; }
    32%       { opacity: 0.65; }
    36%       { stroke-dashoffset: 0; opacity: 0.45; }
    43%       { opacity: 0; }
    57%       { opacity: 0; stroke-dashoffset: 0; }
    60%       { opacity: 0.5; }
    71%       { stroke-dashoffset: -41.48; opacity: 0; }
    100%      { opacity: 0; }
  }

  /* ─── P7  L=194.79 ─── */
  @keyframes lp7s {
    0%,31%      { stroke-dashoffset: 194.79; stroke-opacity: 0; }
    31.5%       { stroke-opacity: 1; }
    32.5%       { stroke-dashoffset: 191.5; }
    46%         { stroke-dashoffset: -1.1; }
    47.5%       { stroke-dashoffset: 0; }
    60%         { stroke-dashoffset: 0; }
    73%         { stroke-dashoffset: -194.79; stroke-opacity: 1; }
    73.5%       { stroke-opacity: 0; }
    73.51%,100% { stroke-dashoffset: -194.79; stroke-opacity: 0; }
  }
  @keyframes lp7f {
    0%,40%    { fill-opacity: 0; }
    43%       { fill-opacity: 0.15; }
    46%       { fill-opacity: 0.5; }
    49%       { fill-opacity: 0.9; }
    52%       { fill-opacity: 1; }
    58%       { fill-opacity: 1; }
    59.5%     { fill-opacity: 0.82; }
    61%       { fill-opacity: 1; }
    64%       { fill-opacity: 0.9; }
    67%       { fill-opacity: 0.5; }
    70%       { fill-opacity: 0.15; }
    72%       { fill-opacity: 0; }
    100%      { fill-opacity: 0; }
  }
  @keyframes lg7 {
    0%,31%    { opacity: 0; stroke-dashoffset: 194.79; }
    32.5%     { opacity: 0.3; stroke-dashoffset: 191.5; }
    37%       { opacity: 0.65; }
    46%       { stroke-dashoffset: 0; opacity: 0.45; }
    53%       { opacity: 0; }
    58%       { opacity: 0; stroke-dashoffset: 0; }
    61%       { opacity: 0.5; }
    73%       { stroke-dashoffset: -194.79; opacity: 0; }
    100%      { opacity: 0; }
  }

  /* ─── Light sweep ─── */
  @keyframes lightSweep {
    0%,44%    { transform: translateX(-30px); opacity: 0; }
    46%       { opacity: 1; }
    58%       { opacity: 1; }
    60%       { transform: translateX(160px); opacity: 0; }
    100%      { transform: translateX(160px); opacity: 0; }
  }

  /* ─── Breathe pulse ─── */
  @keyframes breathe {
    0%,44%    { filter: url(#noGlow); }
    48%       { filter: url(#breatheGlow); }
    52%       { filter: url(#noGlow); }
    56%       { filter: url(#breatheGlow); }
    60%       { filter: url(#noGlow); }
    100%      { filter: url(#noGlow); }
  }

  /*
    stroke-dasharray uses "L, (L+2)" so the gap always exceeds
    the dash length — prevents round-cap bleed at offset boundaries.
  */
  #lp1 {
    stroke-dasharray: 204.59, 206.59;
    animation-name: lp1s, lp1f;
    animation-timing-function:
      cubic-bezier(0.12, 0.72, 0.28, 1),
      cubic-bezier(0.37, 0, 0.63, 1);
  }
  #lp2 {
    stroke-dasharray: 111.11, 113.11;
    animation-name: lp2s, lp2f;
    animation-timing-function:
      cubic-bezier(0.15, 0.68, 0.30, 1),
      cubic-bezier(0.37, 0, 0.63, 1);
  }
  #lp3 {
    stroke-dasharray: 100.78, 102.78;
    animation-name: lp3s, lp3f;
    animation-timing-function:
      cubic-bezier(0.15, 0.68, 0.30, 1),
      cubic-bezier(0.37, 0, 0.63, 1);
  }
  #lp4 {
    stroke-dasharray: 80.70, 82.70;
    animation-name: lp4s, lp4f;
    animation-timing-function:
      cubic-bezier(0.18, 0.64, 0.32, 1),
      cubic-bezier(0.37, 0, 0.63, 1);
  }
  #lp5 {
    stroke-dasharray: 103.36, 105.36;
    animation-name: lp5s, lp5f;
    animation-timing-function:
      cubic-bezier(0.15, 0.68, 0.30, 1),
      cubic-bezier(0.37, 0, 0.63, 1);
  }
  #lp6 {
    stroke-dasharray: 41.48, 43.48;
    animation-name: lp6s, lp6f;
    animation-timing-function:
      cubic-bezier(0.20, 0.60, 0.35, 1),
      cubic-bezier(0.37, 0, 0.63, 1);
  }
  #lp7 {
    stroke-dasharray: 194.79, 196.79;
    animation-name: lp7s, lp7f;
    animation-timing-function:
      cubic-bezier(0.12, 0.72, 0.28, 1),
      cubic-bezier(0.37, 0, 0.63, 1);
  }

  /* Glow paths — same extended gap pattern */
  #lg1 { stroke-dasharray: 204.59, 206.59; animation-name: lg1; }
  #lg2 { stroke-dasharray: 111.11, 113.11; animation-name: lg2; }
  #lg3 { stroke-dasharray: 100.78, 102.78; animation-name: lg3; }
  #lg4 { stroke-dasharray: 80.70, 82.70;   animation-name: lg4; }
  #lg5 { stroke-dasharray: 103.36, 105.36; animation-name: lg5; }
  #lg6 { stroke-dasharray: 41.48, 43.48;   animation-name: lg6; }
  #lg7 { stroke-dasharray: 194.79, 196.79; animation-name: lg7; }

  #light-sweep {
    animation: lightSweep 5.8s cubic-bezier(0.37, 0, 0.63, 1) infinite both;
    will-change: transform, opacity;
  }

  #main-paths {
    animation: breathe 5.8s cubic-bezier(0.37, 0, 0.63, 1) infinite both;
  }

  /* ── Demo controls ── */
  #demo-controls {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10000;
  }
  #demo-controls button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    font-size: 13px;
    letter-spacing: 0.04em;
    padding: 8px 22px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #demo-controls button:hover { background: rgba(255,255,255,0.15); }

  @media (prefers-reduced-motion: reduce) {
    .lp, .lp-glow, #light-sweep, #main-paths {
      animation: none !important;
    }
    .lp {
      fill-opacity: 1;
      stroke-dashoffset: 0;
      stroke-opacity: 1;
    }
  }
</style>
</head>
<body>

<div id="roboxrise-loader" role="status" aria-label="Loading…">
  <svg xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 150.22 17.04"
       aria-hidden="true"
       focusable="false">

    <defs>
      <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="#dde4ff"/>
        <stop offset="50%"  stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#dde4ff"/>
      </linearGradient>

      <filter id="softGlow" x="-10%" y="-80%" width="120%" height="260%"
              color-interpolation-filters="sRGB">
        <feGaussianBlur in="SourceGraphic" stdDeviation="0.9"/>
      </filter>

      <filter id="breatheGlow" x="-5%" y="-30%" width="110%" height="160%"
              color-interpolation-filters="sRGB">
        <feGaussianBlur in="SourceGraphic" stdDeviation="0.35" result="b"/>
        <feMerge>
          <feMergeNode in="b"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <filter id="noGlow" x="0%" y="0%" width="100%" height="100%">
        <feOffset in="SourceGraphic"/>
      </filter>

      <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="white" stop-opacity="0"/>
        <stop offset="35%"  stop-color="white" stop-opacity="0.08"/>
        <stop offset="50%"  stop-color="white" stop-opacity="0.18"/>
        <stop offset="65%"  stop-color="white" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="white" stop-opacity="0"/>
      </linearGradient>

      <clipPath id="textClip">
        <use href="#p1"/><use href="#p2"/><use href="#p3"/>
        <use href="#p4"/><use href="#p5"/><use href="#p6"/><use href="#p7"/>
      </clipPath>

<script>
  function showLoader() {
    var el = document.getElementById('roboxrise-loader');
    el.style.display = 'flex';
    void el.offsetWidth;
    el.classList.remove('hidden');
  }

  function hideLoader() {
    var el = document.getElementById('roboxrise-loader');
    el.classList.add('hidden');
    function once() {
      el.style.display = 'none';
      el.removeEventListener('transitionend', once);
    }
    el.addEventListener('transitionend', once);
  }

  document.addEventListener('DOMContentLoaded', function () {
    var controls = document.createElement('div');
    controls.id = 'demo-controls';
    controls.innerHTML =
      '<button onclick="hideLoader()">Hide loader</button>' +
      '<button onclick="showLoader()">Show loader</button>';
    document.body.appendChild(controls);
  });
</script>
